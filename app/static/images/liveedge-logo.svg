    <path d="M4 8 C6 3, 12 1, 18 2 C22 3, 26 2, 30 4 L30 28 C28 30, 24 31, 18 30 C12 29, 8 31, 4 28 Z" fill="#004526"/>
    <path d="M8 12 C10 10, 14 9, 18 10 C22 11, 25 10, 28 12 L28 24 C26 26, 22 27, 18 26 C14 25, 10 26, 8 24 Z" fill="#006834"/>
