    <path d="M10 19 C14 18, 17 18, 21 19 C24 20, 26 19, 27 20" stroke="#c5a059" stroke-width="0.8" fill="none" opacity="0.4"/>
  </g>
  <!-- "LIVEEDGE" text -->
