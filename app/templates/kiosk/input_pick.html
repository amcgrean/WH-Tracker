{% extends "kiosk_base.html" %}
{% block title %}Scan Pick — {{ picker.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <h2 class="mb-2" style="font-weight:800; color:#004526;">
            <i class="fas fa-barcode mr-2"></i>Scan Barcode
        </h2>
        <p class="text-muted mb-4" style="font-size:1.1rem;">
            Picker: <strong>{{ picker.name }}</strong>
        </p>

        <form id="pickForm" action="{{ url_for('main.kiosk_input_pick', branch=kiosk_branch, picker_id=picker.id, pick_type_id=pick_type_id) }}" method="post">
            <div class="mb-4">
                <input type="text" class="kiosk-input text-center" id="barcodeInput" name="barcode"
                       placeholder="Scan or type barcode…" pattern="[0-9\s\-]+" required autofocus
                       autocomplete="off">
                <small class="d-block text-muted mt-2">Numbers, spaces, and hyphens only.</small>
            </div>
            <button type="submit" class="kiosk-btn kiosk-btn-primary d-block w-100">
                <i class="fas fa-check mr-2"></i>Submit Pick
            </button>
        </form>

        <div class="mt-4">
            <a href="{{ url_for('main.kiosk_confirm_picker', branch=kiosk_branch, picker_id=picker.id) }}"
               class="text-muted font-weight-bold" style="font-size:1.1rem;">
                <i class="fas fa-arrow-left mr-1"></i> Back
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('pickForm').onsubmit = function() {
        var input = document.getElementById('barcodeInput');
        if (!/^[0-9\s\-]+$/.test(input.value)) {
            alert("Invalid input. Only numbers, spaces, and hyphens are allowed.");
            return false;
        }
        return true;
    };
    // Keep focus on barcode input for continuous scanning
    document.addEventListener('click', function() {
        document.getElementById('barcodeInput').focus();
    });
</script>
{% endblock %}
