<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Code — LiveEdge</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/liveedge-icon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            padding: 40px 32px 32px;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .auth-brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }
        .auth-brand-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: #004526;
            letter-spacing: -0.02em;
        }
        .auth-brand-text span { font-weight: 400; }
        .auth-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
            margin-bottom: 0;
        }
        .email-badge {
            background: #ecfdf5;
            color: #004526;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .otp-input {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            transition: all 0.15s;
        }
        .otp-input:focus {
            border-color: #004526;
            box-shadow: 0 0 0 3px rgba(0,69,38,0.08);
            outline: none;
        }
        .btn-primary-le {
            background: #004526;
            color: #fff;
            border: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .btn-primary-le:hover { background: #006834; color: #fff; }
        .btn-primary-le:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <img src="{{ url_for('static', filename='images/liveedge-icon.svg') }}" alt="" class="auth-brand-icon">
            <div class="auth-brand-text">LIVE<span>EDGE</span></div>
        </div>
        <p class="auth-subtitle mb-3">Check your email for the code</p>

        {% if email %}
        <div class="text-center mb-3">
            <span class="email-badge"><i class="fas fa-envelope"></i>{{ email }}</span>
        </div>
        {% endif %}

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else ('warning' if category == 'warning' else ('info' if category == 'info' else 'success')) }} py-2" role="alert" style="font-size:.85rem; border-radius: 10px;">
                {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.verify') }}" autocomplete="off">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label class="font-weight-semibold d-block text-center mb-2" style="font-size:.85rem;">
                    Enter your 6-digit code
                </label>
                <input type="text" class="otp-input" name="code"
                       inputmode="numeric" pattern="[0-9]{6}"
                       maxlength="6" placeholder="------"
                       autofocus autocomplete="one-time-code" required>
            </div>
            <button type="submit" class="btn btn-primary-le btn-block mt-2">
                <i class="fas fa-sign-in-alt mr-2"></i>Sign in
            </button>
        </form>

        <div class="text-center mt-3">
            <form method="POST" action="{{ url_for('auth.resend') }}" class="d-inline">
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="btn btn-link btn-sm text-muted p-0" style="font-size:.8rem;">
                    <i class="fas fa-redo-alt mr-1"></i>Resend code
                </button>
            </form>
            <span class="text-muted mx-2" style="font-size:.8rem;">&middot;</span>
            <a href="{{ url_for('auth.login') }}" class="btn btn-link btn-sm text-muted p-0" style="font-size:.8rem;">
                Use a different email
            </a>
        </div>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:.75rem;">
            Code expires in 10 minutes.
        </p>
    </div>

    <p style="color: #adb5bd; font-size: 0.7rem; margin-top: 24px; text-align: center;">
        Beisser Lumber Co.
    </p>

    <script>
        document.querySelector('.otp-input').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            if (this.value.length === 6) {
                this.closest('form').submit();
            }
        });
    </script>
</body>
</html>
