<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TV Display{% endblock %} - Beisser Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/all.min.css">
    {% block head %}{% endblock %}
    <!-- Auto-refresh: default 30s, overridable per-page -->
    <meta http-equiv="refresh" content="{% block refresh_interval %}30{% endblock %}">
    <style>
        /* ── TV Display Shell ────────────────────────────────────────── */
        :root {
            --tv-bg: #0b0c10;
            --tv-surface: #1f2833;
            --tv-border: #45a29e;
            --tv-accent: #66fcf1;
            --tv-text: #c5c6c7;
            --tv-text-bright: #ffffff;
            --tv-success: #28a745;
            --tv-warning: #ffc107;
            --tv-danger: #d62728;
        }
        body.tv-body {
            background-color: var(--tv-bg);
            color: var(--tv-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .tv-container {
            padding: 2vh 2vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .tv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--tv-border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }
        .tv-header__title {
            color: var(--tv-accent);
            font-weight: 800;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tv-header__subtitle {
            font-size: 1.3rem;
            color: var(--tv-text);
            margin-left: 1.5rem;
        }
        .tv-header__meta {
            text-align: right;
        }
        .tv-clock {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--tv-text-bright);
        }
        .tv-branch-badge {
            display: inline-block;
            background: rgba(102,252,241,0.15);
            color: var(--tv-accent);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        .tv-last-updated {
            font-size: 0.85rem;
            color: var(--tv-text);
            opacity: 0.6;
        }
        .tv-content {
            flex: 1;
            overflow: hidden;
        }
        .tv-count-badge {
            font-size: 1.1rem;
            color: var(--tv-text);
        }
        /* TV cards */
        .tv-card {
            background-color: var(--tv-surface);
            border: 1px solid var(--tv-border);
            border-radius: 15px;
            margin-bottom: 1.2rem;
            transition: all 0.3s;
        }
        .tv-card.assigned {
            border-color: var(--tv-success);
            opacity: 0.85;
        }
        .tv-card .card-body {
            padding: 1.5rem 2rem;
        }
        .tv-so-num {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--tv-accent);
        }
        .tv-cust-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--tv-text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tv-line-badge {
            font-size: 1rem;
            background: var(--tv-border);
            color: var(--tv-bg);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 800;
        }
        .tv-status-assigned {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--tv-success);
        }
        .tv-status-pending {
            color: var(--tv-warning);
            font-weight: 800;
            font-size: 1.1rem;
        }
        /* Empty state */
        .tv-empty {
            text-align: center;
            margin-top: 15vh;
        }
        .tv-empty h1 {
            font-size: 3rem;
            color: var(--tv-text);
            opacity: 0.4;
        }
        .tv-empty p {
            font-size: 1.5rem;
            color: var(--tv-text);
            opacity: 0.3;
        }
    </style>
</head>
<body class="tv-body">
    <div class="tv-container">
        <div class="tv-header">
            <div class="d-flex align-items-baseline">
                <span class="tv-header__title">{% block header_title %}Display{% endblock %}</span>
                <span class="tv-header__subtitle">{% block header_subtitle %}{% endblock %}</span>
            </div>
            <div class="tv-header__meta">
                {% if tv_branch %}
                <div class="tv-branch-badge">
                    <i class="fas fa-map-marker-alt mr-1"></i>{{ tv_branch_label }}
                </div>
                {% endif %}
                <div id="tvClock" class="tv-clock"></div>
                <div class="tv-last-updated">
                    Updated: <span id="tvLastUpdated"></span>
                </div>
            </div>
        </div>

        <div class="tv-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        (function() {
            var clockEl = document.getElementById('tvClock');
            var updatedEl = document.getElementById('tvLastUpdated');
            function tick() {
                var now = new Date();
                clockEl.textContent = now.toLocaleTimeString();
            }
            updatedEl.textContent = new Date().toLocaleTimeString();
            tick();
            setInterval(tick, 1000);
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
