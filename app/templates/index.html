{% extends "kiosk_base.html" %}

{% block title %}Pickers{% endblock %}

{% block head %}
{{ super() }}
<meta http-equiv="refresh" content="120">
<style>
    .kiosk-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .kiosk-header h1 {
        font-size: 2rem;
        font-weight: 800;
        color: var(--beisser-green);
    }

    .kiosk-header p {
        color: var(--text-muted);
        font-size: 1rem;
    }

    .picker-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.25rem;
        max-width: 1200px;
        width: 100%;
    }

    .picker-card {
        background: white;
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: var(--border-radius-md);
        padding: 1.5rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: var(--shadow-sm);
    }

    .picker-card:hover {
        transform: translateY(-4px) scale(1.03);
        box-shadow: var(--shadow-lg);
        border-color: var(--beisser-green-light);
    }

    .picker-card a {
        text-decoration: none;
        color: var(--dark-charcoal);
        font-weight: 700;
        font-size: 1.1rem;
        display: block;
    }

    .picker-card .picker-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--beisser-green), var(--beisser-green-light));
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        margin-bottom: 0.75rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center py-5" style="min-height: calc(100vh - 180px);">
    <div class="kiosk-header">
        <i class="fas fa-cubes fa-2x mb-3" style="color: var(--beisser-green);"></i>
        <h1>Select Your Name</h1>
        <p>Tap your name to start picking</p>
    </div>
    <div class="picker-grid">
        {% for picker in pickers %}
        <div class="picker-card">
            <a href="{{ url_for('main.confirm_picker', picker_id=picker.id) }}">
                <div class="picker-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div>{{ picker.name }}</div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
