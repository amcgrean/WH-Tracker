{% extends "base.html" %}

{% block content %}
<div class="container mt-5 pb-5">
    <div class="text-center mb-5 animate-fade-in">
        <h1 class="display-4 font-weight-bold text-gradient">Select Handling Code</h1>
        <p class="lead text-muted">Choose the zone you are picking for.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="handling-grid">
                <a href="{{ url_for('main.warehouse_list', code='Deck Bldg') }}" class="handling-grid__btn" style="background: linear-gradient(135deg, #17a2b8, #138496);">
                    <i class="fas fa-hammer mr-3"></i> Deck Bldg
                </a>
                <a href="{{ url_for('main.warehouse_list', code='Door1') }}" class="handling-grid__btn" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
                    <i class="fas fa-door-open mr-3"></i> Door1
                </a>
                <a href="{{ url_for('main.warehouse_list', code='EWP') }}" class="handling-grid__btn" style="background: linear-gradient(135deg, #ffc107, #e0a800); color: #1a1a1b;">
                    <i class="fas fa-layer-group mr-3"></i> EWP
                </a>
                <a href="{{ url_for('main.warehouse_list', code='Metals') }}" class="handling-grid__btn" style="background: linear-gradient(135deg, #6c757d, #545b62);">
                    <i class="fas fa-industry mr-3"></i> Metals
                </a>
            </div>
            <div class="mt-4 text-center">
                <a href="{{ url_for('main.work_center') }}" class="btn btn-outline-dark btn-lg shadow-sm" style="border-radius: var(--border-radius-md);">
                    <i class="fas fa-chevron-left mr-2"></i> Back to Work Center
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
