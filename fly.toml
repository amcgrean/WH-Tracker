# Fly.io app scaffold for WH-Tracker (Phase 2)
# Replace app/region values before first deploy.
app = "wh-tracker-fly"
primary_region = "ord"

[build]

[env]
  PORT = "8080"

[processes]
  app = "sh -c 'gunicorn run:app --bind 0.0.0.0:${PORT:-8080}'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/healthz"
